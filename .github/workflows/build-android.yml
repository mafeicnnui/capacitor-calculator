name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build web assets
      run: npm run build
      
    - name: Prepare icon directories
      run: |
        node generate-icons.js
        node create-simple-icon.js
      continue-on-error: true
        
    - name: Remove existing Android platform
      run: |
        if [ -d "android" ]; then
          echo "Removing existing android directory..."
          rm -rf android
        fi
        
    - name: Add Android platform
      run: npx cap add android
      
    - name: Copy icons to Android resources
      run: |
        if [ -d "android/app/src/main/res" ]; then
          echo "Android resources directory exists"
          ls -la android/app/src/main/res/
        else
          echo "Creating Android resources directory"
          mkdir -p android/app/src/main/res
        fi
      continue-on-error: true
      
    - name: Sync to Android
      run: npx cap sync android
      
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace --info
        
    - name: List APK files
      run: |
        echo "Searching for APK files..."
        find android -name "*.apk" -type f
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error