<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 计算器外壳 -->
  <defs>
    <linearGradient id="shellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operatorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="equalsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外壳背景 -->
  <rect x="32" y="32" width="448" height="448" rx="48" ry="48" fill="url(#shellGradient)" stroke="#1a252f" stroke-width="4"/>
  
  <!-- 屏幕 -->
  <rect x="64" y="64" width="384" height="96" rx="12" ry="12" fill="url(#screenGradient)" stroke="#0f1419" stroke-width="2"/>
  
  <!-- 屏幕显示文字 -->
  <text x="432" y="128" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="end">123.45</text>
  
  <!-- 按钮网格 -->
  <!-- 第一行 -->
  <rect x="80" y="192" width="72" height="48" rx="8" ry="8" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="116" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">C</text>
  
  <rect x="168" y="192" width="72" height="48" rx="8" ry="8" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="204" y="222" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">CE</text>
  
  <rect x="256" y="192" width="72" height="48" rx="8" ry="8" fill="url(#operatorGradient)" stroke="#bf6516" stroke-width="1"/>
  <text x="292" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">⌫</text>
  
  <rect x="344" y="192" width="72" height="48" rx="8" ry="8" fill="url(#operatorGradient)" stroke="#bf6516" stroke-width="1"/>
  <text x="380" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">÷</text>
  
  <!-- 第二行 -->
  <rect x="80" y="256" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="116" y="286" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">7</text>
  
  <rect x="168" y="256" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="204" y="286" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">8</text>
  
  <rect x="256" y="256" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="292" y="286" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">9</text>
  
  <rect x="344" y="256" width="72" height="48" rx="8" ry="8" fill="url(#operatorGradient)" stroke="#bf6516" stroke-width="1"/>
  <text x="380" y="286" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">×</text>
  
  <!-- 第三行 -->
  <rect x="80" y="320" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="116" y="350" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">4</text>
  
  <rect x="168" y="320" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="204" y="350" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">5</text>
  
  <rect x="256" y="320" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="292" y="350" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">6</text>
  
  <rect x="344" y="320" width="72" height="48" rx="8" ry="8" fill="url(#operatorGradient)" stroke="#bf6516" stroke-width="1"/>
  <text x="380" y="350" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">-</text>
  
  <!-- 第四行 -->
  <rect x="80" y="384" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="116" y="414" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">1</text>
  
  <rect x="168" y="384" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="204" y="414" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>
  
  <rect x="256" y="384" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="292" y="414" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>
  
  <rect x="344" y="384" width="72" height="48" rx="8" ry="8" fill="url(#operatorGradient)" stroke="#bf6516" stroke-width="1"/>
  <text x="380" y="414" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">+</text>
  
  <!-- 第五行 -->
  <rect x="80" y="448" width="160" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="160" y="478" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">0</text>
  
  <rect x="256" y="448" width="72" height="48" rx="8" ry="8" fill="url(#buttonGradient)" stroke="#6c7b7d" stroke-width="1"/>
  <text x="292" y="478" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">.</text>
  
  <rect x="344" y="448" width="72" height="48" rx="8" ry="8" fill="url(#equalsGradient)" stroke="#1e8449" stroke-width="1"/>
  <text x="380" y="478" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">=</text>
  
  <!-- 高光效果 -->
  <rect x="32" y="32" width="448" height="448" rx="48" ry="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</svg>